<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Studytrix Offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0f172a;
          color: #e2e8f0;
        }
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.85);
        padding: 24px;
        text-align: center;
        box-sizing: border-box;
      }

      @media (prefers-color-scheme: dark) {
        .card {
          background: rgba(15, 23, 42, 0.8);
          border-color: rgba(148, 163, 184, 0.28);
        }
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 10px 0 0;
        color: #475569;
      }

      @media (prefers-color-scheme: dark) {
        p {
          color: #94a3b8;
        }
      }

      .actions {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        text-decoration: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        border: 1px solid transparent;
      }

      .btn-primary {
        background: #2563eb;
        color: #fff;
      }

      .btn-secondary {
        background: transparent;
        color: inherit;
        border-color: rgba(100, 116, 139, 0.45);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>You are offline</h1>
        <p>Studytrix is running in offline mode. Reconnect for live updates.</p>
        <div class="actions">
          <a class="btn btn-primary" href="/offline-library.html">Go to Offline Library</a>
          <a class="btn btn-secondary" href="/">Retry Dashboard</a>
        </div>
      </section>
    </main>
  </body>
</html>
